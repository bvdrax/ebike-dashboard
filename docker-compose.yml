version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ebike
      POSTGRES_USER: ebike
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ebike"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ebike
      DB_USER: ebike
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      STRAVA_REFRESH_TOKEN: ${STRAVA_REFRESH_TOKEN}
      LACHLAN_STRAVA_ID: ${LACHLAN_STRAVA_ID}
      ADMIN_SETUP_KEY: ${ADMIN_SETUP_KEY}

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ebike.rule=Host(`ebike.supervarelas.com`)"
      - "traefik.http.routers.ebike.entrypoints=websecure"
      - "traefik.http.routers.ebike.tls.certresolver=cloudflare"
      - "traefik.http.routers.ebike.tls.domains[0].main=supervarelas.com"
      - "traefik.http.routers.ebike.tls.domains[0].sans=*.supervarelas.com"
      - "traefik.http.services.ebike.loadbalancer.server.port=80"

volumes:
  db_data:

networks:
  proxy:
    external: true
